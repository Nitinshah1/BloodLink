<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Dashboard - Blood Donor Matching System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Donor Dashboard</h1>
            <p class="tagline">Manage your donor profile</p>
        </header>

        <main>
            <div id="loadingMessage" class="loading-message">
                <p>Loading...</p>
            </div>

            <div id="dashboardContent" style="display: none;">
                <!-- Availability Toggle -->
                <section class="availability-section">
                    <h2>Availability Status</h2>
                    <div class="availability-toggle">
                        <span class="status-label">Currently:</span>
                        <div class="toggle-container">
                            <button id="availabilityToggle" class="toggle-btn">
                                <span id="toggleText">OFF</span>
                            </button>
                        </div>
                        <span id="availabilityStatus" class="status-text">Not Available</span>
                    </div>
                    <p class="help-text">Toggle your availability for blood donation requests</p>
                </section>

                <!-- Profile Information -->
                <section class="profile-section">
                    <div class="section-header">
                        <h2>Profile Information</h2>
                        <button id="editBtn" class="btn btn-secondary btn-small">Edit Profile</button>
                    </div>
                    
                    <div id="profileView" class="profile-view">
                        <div class="profile-item">
                            <span class="label">Name:</span>
                            <span id="profileName" class="value"></span>
                        </div>
                        <div class="profile-item">
                            <span class="label">Email:</span>
                            <span id="profileEmail" class="value"></span>
                        </div>
                        <div class="profile-item">
                            <span class="label">Mobile:</span>
                            <span id="profileMobile" class="value"></span>
                        </div>
                        <div class="profile-item">
                            <span class="label">Blood Group:</span>
                            <span id="profileBloodGroup" class="value"></span>
                        </div>
                        <div class="profile-item">
                            <span class="label">City:</span>
                            <span id="profileCity" class="value"></span>
                        </div>
                        <div class="profile-item">
                            <span class="label">Last Donation:</span>
                            <span id="profileLastDonation" class="value"></span>
                        </div>
                    </div>

                    <!-- Edit Form -->
                    <form id="editForm" class="edit-form" style="display: none;">
                        <div class="form-group">
                            <label for="editName">Full Name <span class="required">*</span></label>
                            <input type="text" id="editName" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="editEmail">Email Address</label>
                            <input type="email" id="editEmail" name="email">
                        </div>

                        <div class="form-group">
                            <label for="editMobile">Mobile Number <span class="required">*</span></label>
                            <input type="tel" id="editMobile" name="mobile" required pattern="[0-9]{10}">
                        </div>

                        <div class="form-group">
                            <label for="editBloodGroup">Blood Group <span class="required">*</span></label>
                            <select id="editBloodGroup" name="bloodGroup" required>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="editCity">City <span class="required">*</span></label>
                            <input type="text" id="editCity" name="city" required>
                        </div>

                        <div class="form-group">
                            <label for="editLastDonation">Last Blood Donation Date</label>
                            <input type="date" id="editLastDonation" name="lastDonation" max="">
                        </div>

                        <div class="form-group">
                            <label for="editPassword">New Password</label>
                            <input type="password" id="editPassword" name="password" minlength="6" 
                                   placeholder="Leave blank to keep current password">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" id="cancelEditBtn" class="btn btn-secondary">Cancel</button>
                        </div>
                    </form>
                </section>

                <div id="successMessage" class="success-message" style="display: none;">
                    <p id="successText"></p>
                </div>

                <div id="errorMessage" class="error-message-box" style="display: none;">
                    <p id="errorText"></p>
                </div>
            </div>
        </main>

        <footer>
            <button id="logoutBtn" class="btn-link">Logout</button>
            <a href="index.html">← Back to Home</a>
        </footer>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
